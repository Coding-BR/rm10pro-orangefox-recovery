<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TWRP Web File Manager</title>
<style>
:root {
  /* Light Theme */
  --bg-color: #F7F8FA;
  --header-bg: rgba(255, 255, 255, 0.85);
  --card-bg: #FFFFFF;
  
  --primary-color: #367AF6;
  --primary-hover: #2860C6;
  --danger-color: #FA4848;
  --warning-bg: #FFF4E5;
  --warning-text: #D67A00;
  
  --text-primary: #1F2329;
  --text-secondary: #8F959E;
  --border-color: #EBEDF0;
  
  --input-bg: #F2F4F7;
  --input-border: transparent;
  --input-text: #1F2329;
  
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.05);
  --shadow-floating: 0 8px 24px rgba(0, 0, 0, 0.08);
  
  --radius-card: 24px;
  --radius-btn: 999px;
  --radius-input: 12px;
  
  --transition-ease: cubic-bezier(0.4, 0, 0.2, 1);
}

.dark-theme {
  /* Dark Theme */
  --bg-color: #000000;
  --header-bg: rgba(30, 30, 30, 0.85);
  --card-bg: #1C1C1E;
  
  --primary-color: #60A5FA;
  --primary-hover: #93C5FD;
  --danger-color: #F87171;
  --warning-bg: #451A03;
  --warning-text: #FCD34D;
  
  --text-primary: #FFFFFF;
  --text-secondary: #71717A;
  --border-color: #3F3F46;
  
  --input-bg: #27272A;
  --input-border: #3F3F46;
  --input-text: #F4F4F5;
  
  --shadow-sm: none;
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
  --shadow-floating: 0 8px 24px rgba(0, 0, 0, 0.6);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, "PingFang SC", "MiSans", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg-color);
  color: var(--text-primary);
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  transition: background-color 0.3s var(--transition-ease), color 0.3s var(--transition-ease);
}

/* Header */
header {
  background: transparent; 
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-bottom: none;
  position: relative;
  z-index: 100;
  width: 100%;
  padding-top: 16px;
  padding-bottom: 4px;
  pointer-events: none;
  display: flex;
  justify-content: center;
}

.header-inner {
  pointer-events: auto;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  width: calc(100% - 40px); 
  max-width: 1160px;
  padding: 12px 24px;
  border-radius: 24px;
  box-shadow: var(--shadow-floating);
  border: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s var(--transition-ease);
}

.dark-theme .header-inner {
  border: 1px solid rgba(255,255,255,0.1);
}

.header-title {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  color: var(--text-primary);
}

.current-path {
  font-weight: 400;
  color: var(--text-secondary);
  background: var(--input-bg);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Monaco', 'Consolas', monospace;
  border: 1px solid var(--input-border);
  max-width: 400px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-buttons {
  display: flex;
  gap: 12px;
}

/* Buttons Base */
button {
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-btn);
  padding: 0 20px; 
  height: 40px; 
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s var(--transition-ease);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  box-sizing: border-box;
}

button:hover {
  filter: brightness(0.95);
  transform: scale(1.02);
}

button:active {
  transform: scale(0.98);
}

/* Action Buttons */
#upload-btn, #path-submit-btn, #cmd-run, #rename-confirm, #delete-confirm {
  background: var(--primary-color);
  color: #FFFFFF;
  border: 1px solid transparent;
  box-shadow: 0 4px 12px rgba(54, 122, 246, 0.3);
}

#path-submit-btn, #upload-btn {
  min-width: 80px;
}

.dark-theme #upload-btn, 
.dark-theme #path-submit-btn, 
.dark-theme #cmd-run {
  box-shadow: 0 4px 12px rgba(96, 165, 250, 0.2);
}

#upload-btn:hover, #path-submit-btn:hover, #cmd-run:hover {
  background: var(--primary-hover);
}

#upload-btn:disabled, #path-submit-btn:disabled {
  background: var(--text-secondary);
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

#cancel-btn, #delete-confirm {
  background: var(--danger-color) !important;
  color: white !important;
  box-shadow: 0 4px 12px rgba(250, 72, 72, 0.3);
  border: 1px solid transparent;
}

/* Main Layout */
main {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

section {
  background: var(--card-bg);
  border-radius: var(--radius-card);
  padding: 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--input-border);
  transition: transform 0.2s, box-shadow 0.2s;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
}

/* Inputs */
input[type="text"], textarea, select {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-input);
  padding: 0 16px;
  height: 40px; 
  font-size: 14px;
  color: var(--input-text);
  transition: all 0.2s;
  outline: none;
  box-sizing: border-box;
}

input[type="text"]::placeholder, textarea::placeholder {
  color: var(--text-secondary);
  opacity: 0.7;
}

input[type="text"]:focus, textarea:focus {
  background: var(--card-bg);
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(54, 122, 246, 0.15);
}

textarea {
  width: 100%;
  min-height: 120px;
  padding: 12px 16px; 
  height: auto;
  font-family: 'Monaco', 'Menlo', monospace;
  line-height: 1.6;
  resize: vertical;
}

/* Table Styling */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 10px;
}

thead th {
  text-align: left;
  padding: 12px 16px;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: transparent;
  border-bottom: 1px solid var(--border-color);
}

tbody tr {
  transition: background-color 0.2s;
}

tbody td {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 14px;
}

tbody tr:last-child td {
  border-bottom: none;
}

tbody tr:hover {
  background-color: var(--bg-color);
}

/* Links */
a.dir-link, a.file-link {
  color: var(--text-primary) !important;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
  display: inline-block;
  padding: 2px 0;
}

a.dir-link {
  color: var(--primary-color) !important;
  font-weight: 600;
}

a.file-link:hover, a.dir-link:hover {
  color: var(--primary-hover) !important;
  text-decoration: underline;
}

/* Upload Component - Desktop */
.path-upload-container {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  background: var(--bg-color);
  padding: 16px;
  border-radius: 16px;
  border: 1px solid var(--input-border);
}

.path-form {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  width: 100%;
}

#path-input {
  flex: 1;
  min-width: 200px;
}

#file-input { display: none; }

.file-select-label {
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-btn);
  padding: 0 20px;
  height: 40px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 80px;
  box-sizing: border-box;
}

.file-select-label:hover {
  background: var(--bg-color);
  border-color: var(--primary-color);
  color: var(--primary-color);
}

.file-select-label.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

.file-name-display {
  color: var(--text-secondary);
  font-size: 13px;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin: 0 12px;
}

.upload-widget {
  display: flex;
  align-items: center;
  width: 100%;
}

.upload-actions {
  margin-left: auto;
  display: flex;
}

/* Status Elements */
.small { font-size: 12px; color: var(--text-secondary); }
.space-warning { color: var(--danger-color); font-weight: 600; }

.upload-notice {
  background: var(--warning-bg);
  color: var(--warning-text);
  border-radius: 12px;
  padding: 12px 16px;
  margin: 0 20px 20px 20px;
  font-weight: 600;
  border: 1px solid rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
}

.progress-bar {
  height: 8px;
  background: var(--input-bg);
  border-radius: 99px;
  margin: 12px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--primary-color);
  border-radius: 99px;
  transition: width 0.3s ease;
}

.upload-section {
  background: var(--bg-color);
  padding: 16px;
  border-radius: 16px;
  border: 1px solid var(--input-border);
  margin-top: 16px;
}

/* Context Menu */
.context-menu {
  display: none;
  position: fixed;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  box-shadow: var(--shadow-floating);
  padding: 6px;
  min-width: 140px;
  z-index: 1000;
}

.context-menu ul { padding: 0; margin: 0; list-style: none; }
.context-menu li {
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-primary);
  transition: background 0.2s;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.context-menu li:hover { background: var(--primary-color); color: white; }

/* Modals */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1001;
  backdrop-filter: blur(4px);
  background: rgba(0, 0, 0, 0.6);
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: var(--card-bg);
  border-radius: 28px; 
  border: 1px solid var(--border-color);
  padding: 32px;
  box-shadow: var(--shadow-floating);
  max-width: 400px;
  width: 90%;
  position: relative;
}

.modal-header {
  font-size: 20px;
  font-weight: 600;
  border-bottom: none;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.modal-body { margin-bottom: 24px; color: var(--text-secondary); }
.modal-footer { display: flex; justify-content: flex-end; gap: 12px; }

/* Mobile Adaptation */
@media (max-width: 768px) {
  header { padding-top: 12px; }
  
  .header-inner {
    width: calc(100% - 32px); 
    padding: 12px 16px;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }
  
  .header-title { justify-content: space-between; font-size: 16px; }
  .current-path { max-width: 180px; }
  .header-buttons { justify-content: space-between; }
  .header-buttons button { flex: 1; }

  main { padding: 16px; gap: 16px; }
  section { padding: 16px; }
  
  .path-upload-container {
    flex-direction: column;
    align-items: stretch;
    padding: 12px;
    background: transparent;
    border: none;
  }
  
  .path-form { flex-direction: row; }
  #path-input { width: 100%; }
  
  .upload-widget {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 12px;
    width: 100%;
    align-items: center;
  }
  
  .file-select-label {
    width: 100%;
    text-align: center;
    grid-column: 1;
    grid-row: 1;
    background: var(--input-bg);
    margin: 0;
  }
  
  .upload-actions {
    grid-column: 2;
    grid-row: 1;
    margin-left: 0;
    width: 100%;
    display: flex;
  }
  
  .upload-actions button {
    width: 100%;
    margin: 0;
  }
  
  .file-name-display {
    grid-column: 1 / -1;
    grid-row: 2;
    text-align: center;
    margin: 0;
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.8;
  }

  table { display: block; }
  thead { display: none; }
  tbody { display: block; }
  
  tbody tr {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    margin-bottom: 12px;
    padding: 12px;
    position: relative;
  }
  
  tbody tr:last-child { margin-bottom: 0; }
  
  tbody td { display: block; border: none; padding: 0; text-align: left; }
  
  tbody td:nth-child(2) {
    width: 100%; order: 1;
    font-size: 15px; font-weight: 600;
    margin-bottom: 6px; color: var(--text-primary);
    word-break: break-all;
  }
  
  tbody td:nth-child(1) {
    order: 2; font-size: 12px; color: var(--text-secondary);
    margin-right: 12px; background: var(--input-bg);
    padding: 2px 6px; border-radius: 4px;
  }
  
  tbody td:nth-child(3) {
    order: 3; font-size: 12px; color: var(--text-secondary);
    margin-right: 12px;
  }
  
  tbody td:nth-child(4) {
    order: 4; font-size: 12px; color: var(--text-secondary);
    font-family: monospace;
  }
  
  tbody td:nth-child(5), tbody td:nth-child(6) { display: none; }
  
  tbody tr:active { transform: scale(0.98); transition: transform 0.1s; }
}
</style>
</head>
<body>
<header>
    <div class="header-inner">
        <div class="header-title">
            <span data-i18n="app_title">TWRP 网页文件管理</span>
            <span id="cur-path" class="current-path">{{CURRENT_PATH}}</span>
        </div>
        <div class="header-buttons">
            <button class="language-toggle" id="language-toggle" data-i18n="language_toggle">English</button>
            <button class="theme-toggle" id="theme-toggle" data-i18n="theme_toggle">切换主题</button>
        </div>
    </div>
</header>

<div id="upload-notice" class="upload-notice" style="display: none;" data-i18n="upload_notice">
    文件上传中，右键菜单已被禁用，请勿刷新页面！
</div>

<main>

<section>
    <h2 data-i18n="browse_title">目录浏览</h2>    
    
    <div class="path-upload-container">
        <div class="path-form">
            <input type="text" name="path" id="path-input" value="{{CURRENT_PATH}}" placeholder="输入路径...">
            <button type="button" id="path-submit-btn" data-i18n="open_button">跳转</button>
        </div>
        <span id="path-status" class="small" style="width:100%"></span>
    </div>
    
    <div class="path-upload-container" style="background: transparent; padding: 0; border: 1px dashed var(--border-color);">
        <div class="upload-widget">
            <input type="file" id="file-input">
            
            <label for="file-input" class="file-select-label" id="file-select-label">
                <span data-i18n="button_select_file">选择文件</span>
            </label>
            
            <span id="file-name-display" class="file-name-display" data-i18n="no_file_selected">未选择文件</span>
            
            <div class="upload-actions">
                <button id="upload-btn" data-i18n="start_upload">上传</button>
                <button id="cancel-btn" style="display: none;" data-i18n="cancel_upload">取消</button>
            </div>
        </div>
    </div>
    
    <div class="upload-info" style="margin-bottom: 10px;">
        <span id="space-status" class="small" data-i18n="target_path">目标路径为上方的切换路径</span>
    </div>
    
    <div class="small" data-i18n="edge_warning" style="color: var(--warning-text); margin-bottom: 4px;">
        请勿使用Microsoft Edge浏览器进行大型文件上传，会直接失败！
    </div>
    <div class="small" data-i18n="right_click_hint">
        提示：右键单击(或长按)文件/文件夹可打开操作菜单。
    </div>

    <div class="upload-section" id="upload-section" style="display: none;">
        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="upload-status" class="small" style="font-weight: 500;"></div>
        <div id="upload-details" class="upload-status small"></div>
    </div>

    <div>
        <table>
            <thead>
                <tr>
                    <th data-i18n="table_type">类型</th>
                    <th data-i18n="table_name">名称</th>
                    <th data-i18n="table_size">大小</th>
                    <th data-i18n="table_permission">权限</th>
                    <th data-i18n="table_owner">所有者</th>
                    <th data-i18n="table_group">用户组</th>
                </tr>
            </thead>
            <tbody id="file-table-body">
                {{FILE_TABLE}}
            </tbody>
        </table>
    </div>
</section>

<section>
    <h2 data-i18n="terminal_title">终端</h2>
    <div class="small" data-i18n="terminal_warning" style="margin-bottom: 12px; color: var(--danger-color);">
        命令将在 recovery 环境下以 root 身份执行。务必确认你在做什么。
    </div>
    <div style="display:flex; gap:10px; margin-bottom: 12px;">
        <input type="text" id="cmd-input" placeholder="例如: ls -l /" data-i18n-placeholder="cmd_placeholder" style="flex:1; font-family: monospace;">
        <button id="cmd-run" data-i18n="execute_button">执行</button>
    </div>
    <div>
        <textarea id="cmd-output" readonly placeholder="执行结果将显示在这里..." data-i18n-placeholder="terminal_output_placeholder"></textarea>
    </div>
</section>

<div id="context-menu" class="context-menu">
    <ul>
        <li id="menu-download" data-i18n="menu_download">下载</li>
        <li id="menu-rename" data-i18n="menu_rename">重命名</li>
        <li id="menu-delete" data-i18n="menu_delete" style="color: var(--danger-color);">删除</li>
    </ul>
</div>

<div id="rename-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header" data-i18n="rename_title">重命名</div>
        <div class="modal-body">
            <div id="rename-current-name" class="small" style="margin-bottom: 8px;"></div>
            <input type="text" id="rename-new-name" class="modal-input" data-i18n-placeholder="rename_placeholder" style="width:100%">
        </div>
        <div class="modal-footer">
            <button id="rename-cancel" data-i18n="cancel_button">取消</button>
            <button id="rename-confirm" data-i18n="confirm_button">确认</button>
        </div>
    </div>
</div>

<div id="delete-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header" data-i18n="delete_title">确认删除</div>
        <div class="modal-body">
            <div id="delete-confirm-text" style="font-size: 15px; margin-bottom: 10px;"></div>
            <div class="small" style="color: var(--danger-color);" data-i18n="delete_warning">
                警告：此操作不可撤销！
            </div>
        </div>
        <div class="modal-footer">
            <button id="delete-cancel" data-i18n="cancel_button">取消</button>
            <button id="delete-confirm" data-i18n="confirm_delete">确认删除</button>
        </div>
    </div>
</div>

</main>

<script>
// 保留原有 JS 逻辑
let currentXhr = null;
let isUploading = false;
let contextMenu = document.getElementById('context-menu');
let currentLanguage = 'zh'; 

const translations = {
    zh: {
        'app_title': 'TWRP 网页文件管理',
        'current_path': '当前路径：',
        'language_toggle': 'English',
        'theme_toggle': '切换到深色模式',
        'upload_notice': '文件上传中，右键菜单已被禁用，请勿刷新页面！',
        'browse_title': '目录浏览',
        'switch_path': '切换路径:',
        'open_button': '跳转',
        'upload_file': '上传文件:',
        'start_upload': '上传',
        'cancel_upload': '取消',
        'target_path': '提示：文件将上传至当前显示的目录',

function detectBrowserLanguage() {
    const browserLang = navigator.language || navigator.userLanguage;
    if (!browserLang.startsWith('zh')) {
        return 'en';
    }
    return 'zh';
}

function translatePage(lang) {
    currentLanguage = lang;
    
    const elements = document.querySelectorAll('[data-i18n]');
    elements.forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
            element.textContent = translations[lang][key];
        }
    });
    
    const placeholderElements = document.querySelectorAll('[data-i18n-placeholder]');
    placeholderElements.forEach(element => {
        const key = element.getAttribute('data-i18n-placeholder');
        if (translations[lang] && translations[lang][key]) {
            element.placeholder = translations[lang][key];
        }
    });
    
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    
    const languageToggle = document.getElementById('language-toggle');
    if (languageToggle) {
        languageToggle.textContent = lang === 'zh' ? 'English' : '中文';
    }
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        const isDark = document.body.classList.contains('dark-theme');
        if (lang === 'zh') {
            themeToggle.textContent = isDark ? '切换到浅色模式' : '切换到深色模式';
        } else {
            themeToggle.textContent = isDark ? 'Light Mode' : 'Dark Mode';
        }
    }
    
    localStorage.setItem('language', lang);
}

function getTranslation(key) {
    return translations[currentLanguage] && translations[currentLanguage][key] 
        ? translations[currentLanguage][key] 
        : key;
}

let contextMenuState = {
    item: null,
    type: '',
    name: '',
    path: ''
};

function getCurrentPathFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const pathParam = urlParams.get('path');
    return pathParam || '/';
}

function updateCurrentPathDisplay() {
    const currentPath = getCurrentPathFromURL();
    
    const curPathElement = document.getElementById('cur-path');
    if (curPathElement && curPathElement.textContent === '{{CURRENT_PATH}}') {
        curPathElement.textContent = currentPath;
    }
    
    const pathInput = document.getElementById('path-input');
    if (pathInput && pathInput.value === '{{CURRENT_PATH}}') {
        pathInput.value = currentPath;
    }
}

function getCurrentPath() {
    const pathInput = document.getElementById('path-input');
    return pathInput ? pathInput.value || '/' : '/';
}

document.getElementById('language-toggle').addEventListener('click', function() {
    const newLang = currentLanguage === 'zh' ? 'en' : 'zh';
    translatePage(newLang);
});

document.getElementById('theme-toggle').addEventListener('click', function() {
    const body = document.body;
    const themeToggle = document.getElementById('theme-toggle');
    
    if (body.classList.contains('dark-theme')) {
        body.classList.remove('dark-theme');
        themeToggle.textContent = currentLanguage === 'zh' ? '切换到深色模式' : 'Dark Mode';
        localStorage.setItem('theme', 'light');
    } else {
        body.classList.add('dark-theme');
        themeToggle.textContent = currentLanguage === 'zh' ? '切换到浅色模式' : 'Light Mode';
        localStorage.setItem('theme', 'dark');
    }
});

document.addEventListener('DOMContentLoaded', function() {
    const savedLang = localStorage.getItem('language');
    const detectedLang = savedLang || detectBrowserLanguage();
    
    const savedTheme = localStorage.getItem('theme');
    
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
    } else {
        document.body.classList.remove('dark-theme');
    }

    translatePage(detectedLang);
    updateCurrentPathDisplay();
    
    const dirLinks = document.querySelectorAll('a[href*="path="]');
    dirLinks.forEach(link => {
        if (!link.classList.contains('dir-link')) {
            link.classList.add('dir-link');
        }
        
        link.addEventListener('click', function(e) {
            if (isUploading) {
                e.preventDefault();
                alert(currentLanguage === 'zh' ? '文件上传中，请勿操作目录！' : 'File upload in progress!');
                return;
            }
            
            const href = this.getAttribute('href');
            const pathMatch = href.match(/path=([^&]*)/);
            if (pathMatch) {
                const newPath = decodeURIComponent(pathMatch[1]);
                const pathInput = document.getElementById('path-input');
                const curPathElement = document.getElementById('cur-path');
                
                if (pathInput) pathInput.value = newPath;
                if (curPathElement) curPathElement.textContent = newPath;
            }
        });
    });
    
    const fileLinks = document.querySelectorAll('a[href*="/download"]');
    fileLinks.forEach(link => {
        if (!link.classList.contains('file-link')) {
            link.classList.add('file-link');
        }
    });
    
    document.getElementById('path-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('path-submit-btn').click();
        }
    });
    
    document.getElementById('cmd-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('cmd-run').click();
        }
    });
    
    initContextMenu();
});

async function checkPath(path) {
    const pathStatus = document.getElementById('path-status');
    
    if (!path || path.trim() === '') {
        pathStatus.textContent = currentLanguage === 'zh' ? '请输入路径' : 'Please enter a path';
        pathStatus.className = 'small space-warning';
        return false;
    }
    
    pathStatus.textContent = getTranslation('path_checking');
    pathStatus.className = 'small';
    
    try {
        const response = await fetch(`/check_path?path=${encodeURIComponent(path)}`);
        if (response.status === 200) {
            pathStatus.textContent = getTranslation('path_valid');
            pathStatus.className = 'small';
            return true;
        } else {
            const errorMsg = await response.text();
            pathStatus.textContent = getTranslation('path_invalid') + ': ' + errorMsg;
            pathStatus.className = 'small space-warning';
            return false;
        }
    } catch (e) {
        pathStatus.textContent = getTranslation('path_invalid') + ': ' + e;
        pathStatus.className = 'small space-warning';
        return false;
    }
}

function setUploadState(uploading) {
    isUploading = uploading;
    const dirLinks = document.querySelectorAll('.dir-link');
    const fileLinks = document.querySelectorAll('.file-link');
    const fileRows = document.querySelectorAll('.file-row');
    const pathSubmitBtn = document.getElementById('path-submit-btn');
    const uploadNotice = document.getElementById('upload-notice');
    const cancelBtn = document.getElementById('cancel-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const fileSelectLabel = document.getElementById('file-select-label');
    const uploadSection = document.getElementById('upload-section');
    
    if (uploading) {
        dirLinks.forEach(link => link.classList.add('disabled'));
        fileLinks.forEach(link => link.classList.add('disabled'));
        fileRows.forEach(row => row.classList.add('disabled'));
        pathSubmitBtn.disabled = true;
        
        uploadNotice.style.display = 'flex';
        uploadSection.style.display = 'block';
        
        uploadBtn.style.display = 'none';
        cancelBtn.style.display = 'inline-flex';
        
        fileSelectLabel.classList.add('disabled');
    } else {
        dirLinks.forEach(link => link.classList.remove('disabled'));
        fileLinks.forEach(link => link.classList.remove('disabled'));
        fileRows.forEach(row => row.classList.remove('disabled'));
        pathSubmitBtn.disabled = false;
        
        uploadNotice.style.display = 'none';
        if (!isUploading) {
            uploadSection.style.display = 'none';
        }
        
        uploadBtn.style.display = 'inline-flex';
        cancelBtn.style.display = 'none';
        
        fileSelectLabel.classList.remove('disabled');
    }
}

document.getElementById('cancel-btn').addEventListener('click', function() {
    cancelUpload();
});

document.getElementById('path-submit-btn').addEventListener('click', async function() {
    const pathInput = document.getElementById('path-input').value;
    const isValid = await checkPath(pathInput);
    if (isValid) {
        window.location.href = '/?path=' + encodeURIComponent(pathInput);
    }
});

function cancelUpload() {
    if (currentXhr) {
        currentXhr.abort();
        fetch('/cancel_upload')
            .then(response => response.text())
            .then(result => console.log('取消上传:', result))
            .catch(error => console.error('取消请求失败:', error));
        
        setUploadState(false);
        document.getElementById('upload-status').textContent = getTranslation('upload_cancelled');
        document.getElementById('upload-section').style.display = 'none';
        const uploadDetails = document.getElementById('upload-details');
        if (uploadDetails.textContent) {
            uploadDetails.textContent += ' - ' + (currentLanguage === 'zh' ? '已取消' : 'Cancelled');
        }
    }
}

document.getElementById('file-input').addEventListener('change', async function() {
    const spaceStatus = document.getElementById('space-status');
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name-display');
    
    if (!fileInput.files || fileInput.files.length === 0) {
        spaceStatus.textContent = getTranslation('select_file');
        spaceStatus.className = 'small';
        fileNameDisplay.textContent = getTranslation('no_file_selected'); 
        return;
    }
    
    const file = fileInput.files[0];
    const currentPath = getCurrentPath();
    
    fileNameDisplay.textContent = file.name;
    
    spaceStatus.textContent = getTranslation('space_checking');
    spaceStatus.className = 'small';
    
    try {
        const response = await fetch(`/check_space?dir=${encodeURIComponent(currentPath)}&size=${file.size}`);
        const result = await response.text();
        
        if (response.status === 200) {
            spaceStatus.textContent = getTranslation('space_enough') + ` (${formatFileSize(file.size)})`;
            spaceStatus.className = 'small';
        } else {
            spaceStatus.textContent = getTranslation('space_insufficient') + ': ' + result;
            spaceStatus.className = 'small space-warning';
        }
    } catch (e) {
        spaceStatus.textContent = getTranslation('space_insufficient') + ': ' + e;
        spaceStatus.className = 'small space-warning';
    }
});

document.getElementById('upload-btn').addEventListener('click', async function() {
    if (isUploading) return;
    
    const fileInput = document.getElementById('file-input');
    const currentPath = getCurrentPath();
    const statusSpan = document.getElementById('upload-status');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const uploadDetails = document.getElementById('upload-details');
    const spaceStatus = document.getElementById('space-status');
    const uploadSection = document.getElementById('upload-section');
    
    statusSpan.textContent = '';
    uploadDetails.textContent = '';
    uploadSection.style.display = 'block';

    if (!fileInput.files || fileInput.files.length === 0) {
        statusSpan.textContent = getTranslation('select_file');
        return;
    }
    const file = fileInput.files[0];

    try {
        const checkResponse = await fetch(`/check_space?dir=${encodeURIComponent(currentPath)}&size=${file.size}`);
        if (checkResponse.status !== 200) {
            const errorMsg = await checkResponse.text();
            statusSpan.textContent = (currentLanguage === 'zh' ? '空间不足: ' : 'No space: ') + errorMsg;
            spaceStatus.textContent = getTranslation('space_insufficient');
            spaceStatus.className = 'small space-warning';
            return;
        }
    } catch (e) {
        statusSpan.textContent = getTranslation('space_insufficient') + ': ' + e;
        return;
    }

    try {
        statusSpan.textContent = getTranslation('upload_preparing');
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        
        const params = new URLSearchParams();
        params.set('filename', file.name);
        params.set('upload_dir', currentPath);

        uploadDetails.textContent = file.name + ` (${formatFileSize(file.size)})`;

        setUploadState(true);
        
        const xhr = new XMLHttpRequest();
        currentXhr = xhr;
        
        xhr.upload.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                const percentComplete = (e.loaded / e.total) * 100;
                progressFill.style.width = percentComplete + '%';
                statusSpan.textContent = getTranslation('upload_uploading') + ' ' + percentComplete.toFixed(1) + '%';
            }
        });
        
        xhr.addEventListener('load', function() {
            setUploadState(false);
            currentXhr = null;
            
            if (xhr.status === 200) {
                statusSpan.textContent = getTranslation('upload_complete');
                progressFill.style.width = '100%';
                spaceStatus.textContent = getTranslation('upload_complete');
                spaceStatus.className = 'small';
                setTimeout(() => { window.location.reload(); }, 1000);
            } else {
                statusSpan.textContent = getTranslation('upload_failed');
                spaceStatus.textContent = getTranslation('upload_failed');
                spaceStatus.className = 'small space-warning';
            }
        });
        
        xhr.addEventListener('error', function() {
            setUploadState(false);
            currentXhr = null;
            statusSpan.textContent = getTranslation('upload_failed');
            spaceStatus.textContent = getTranslation('upload_failed');
            spaceStatus.className = 'small space-warning';
        });
        
        xhr.addEventListener('abort', function() {
            setUploadState(false);
            currentXhr = null;
            statusSpan.textContent = getTranslation('upload_cancelled');
            progressBar.style.display = 'none';
            spaceStatus.textContent = getTranslation('upload_cancelled');
        });
        
        xhr.open('POST', '/upload?' + params.toString());
        xhr.send(file);
        
    } catch (e) {
        setUploadState(false);
        currentXhr = null;
        statusSpan.textContent = getTranslation('upload_failed') + ': ' + e;
        spaceStatus.className = 'small space-warning';
    }
});

document.getElementById('cmd-run').addEventListener('click', async function() {
    const cmd = document.getElementById('cmd-input').value;
    const out = document.getElementById('cmd-output');
    out.value = '';
    if (!cmd) {
        out.value = getTranslation('enter_command');
        return;
    }
    try {
        const body = new URLSearchParams();
        body.set('cmd', cmd);
        const resp = await fetch('/cmd', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString()
        });
        const text = await resp.text();
        out.value = text;
    } catch (e) {
        out.value = getTranslation('request_failed') + ': ' + e;
    }
});

function formatFileSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

document.addEventListener('click', function(e) {
    if (isUploading && (e.target.classList.contains('dir-link') || e.target.classList.contains('file-link'))) {
        e.preventDefault();
        alert(currentLanguage === 'zh' ? '文件上传中，请勿操作目录！' : 'File upload in progress!');
    }
});

function initContextMenu() {
    const fileTable = document.getElementById('file-table-body');
    
    fileTable.addEventListener('contextmenu', function(e) {
        if (isUploading) {
            e.preventDefault();
            return;
        }
        
        e.preventDefault();
        
        let target = e.target;
        while (target && target.nodeName !== 'TR') {
            target = target.parentElement;
        }
        
        if (target && target.classList.contains('file-row') && !target.classList.contains('disabled')) {
            const cells = target.cells;
            if (cells.length >= 2) {
                contextMenuState.item = target;
                
                const typeCellText = cells[0].textContent.trim();
                if (typeCellText === '目录' || typeCellText === 'Directory') {
                    contextMenuState.type = 'dir';
                } else {
                    contextMenuState.type = 'file';
                }
                
                const nameCell = cells[1];
                if (nameCell.querySelector('a')) {
                    contextMenuState.name = nameCell.querySelector('a').textContent.trim();
                } else {
                    contextMenuState.name = nameCell.textContent.trim();
                }
                
                contextMenuState.path = getCurrentPath();
                
                document.querySelectorAll('.file-row').forEach(row => {
                    row.classList.remove('context-menu-active');
                    row.style.background = ''; // Clear inline style
                });
                target.classList.add('context-menu-active');
                target.style.background = 'var(--warning-bg)'; // Highlight
                
                const downloadMenu = document.getElementById('menu-download');
                if (contextMenuState.type === 'dir') {
                    downloadMenu.style.display = 'none';
                } else {
                    downloadMenu.style.display = 'block';
                }
                
                showContextMenu(e.clientX, e.clientY);
            }
        }
    });
    
    document.addEventListener('click', function(e) {
        if (!contextMenu.contains(e.target)) {
            hideContextMenu();
        }
    });
    
    document.getElementById('menu-download').addEventListener('click', function() {
        if (contextMenuState.item && contextMenuState.type === 'file') {
            downloadFile();
        }
        hideContextMenu();
    });
    
    document.getElementById('menu-rename').addEventListener('click', function() {
        if (contextMenuState.item) {
            showRenameModal();
        }
        hideContextMenu();
    });
    
    document.getElementById('menu-delete').addEventListener('click', function() {
        if (contextMenuState.item) {
            showDeleteModal();
        }
        hideContextMenuOnly();
    });
    
    document.getElementById('rename-cancel').addEventListener('click', function() {
        hideModal('rename-modal');
    });
    
    document.getElementById('delete-cancel').addEventListener('click', function() {
        hideModal('delete-modal');
    });
    
    document.getElementById('delete-confirm').addEventListener('click', function() {
        deleteFile();
    });
    
    document.getElementById('rename-confirm').addEventListener('click', function() {
        renameFile();
    });
    
    document.getElementById('rename-new-name').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            renameFile();
        }
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            hideModal('rename-modal');
            hideModal('delete-modal');
        }
    });
}

function showContextMenu(x, y) {
    if (isUploading) return;
    
    const menuWidth = contextMenu.offsetWidth;
    const menuHeight = contextMenu.offsetHeight;
    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;
    
    let posX = x;
    let posY = y;
    
    if (x + menuWidth > windowWidth) posX = windowWidth - menuWidth - 10;
    if (y + menuHeight > windowHeight) posY = windowHeight - menuHeight - 10;
    
    contextMenu.style.left = posX + 'px';
    contextMenu.style.top = posY + 'px';
    contextMenu.style.display = 'block';
    
    // Add subtle animation
    contextMenu.style.opacity = '0';
    contextMenu.style.transform = 'scale(0.95)';
    requestAnimationFrame(() => {
        contextMenu.style.transition = 'opacity 0.2s, transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)';
        contextMenu.style.opacity = '1';
        contextMenu.style.transform = 'scale(1)';
    });
}

function hideContextMenuOnly() {
    contextMenu.style.display = 'none';
}

function hideContextMenu() {
    contextMenu.style.display = 'none';
    if (contextMenuState.item) {
        contextMenuState.item.classList.remove('context-menu-active');
        contextMenuState.item.style.background = '';
    }
}

function clearContextMenuState() {
    if (contextMenuState.item) {
        contextMenuState.item.classList.remove('context-menu-active');
        contextMenuState.item.style.background = '';
    }
    contextMenuState = { item: null, type: '', name: '', path: '' };
}

function showRenameModal() {
    const fileName = contextMenuState.name;
    document.getElementById('rename-current-name').textContent = fileName;
    document.getElementById('rename-new-name').value = fileName;
    showModal('rename-modal');
    setTimeout(() => {
        document.getElementById('rename-new-name').focus();
        document.getElementById('rename-new-name').select();
    }, 100);
}

function showDeleteModal() {
    const fileName = contextMenuState.name;
    document.getElementById('delete-confirm-text').textContent = 
        (currentLanguage === 'zh' ? '确定要删除 "' : 'Delete "') + fileName + (currentLanguage === 'zh' ? '" 吗？' : '"?');
    showModal('delete-modal');
}

function showModal(modalId) {
    const modal = document.getElementById(modalId);
    modal.style.display = 'flex';
    modal.style.opacity = '0';
    setTimeout(() => {
        modal.style.transition = 'opacity 0.3s';
        modal.style.opacity = '1';
    }, 10);
}

function hideModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
}

function downloadFile() {
    if (!contextMenuState.item || contextMenuState.type !== 'file') return;
    const fileName = contextMenuState.name;
    const currentPath = contextMenuState.path;
    const fullPath = currentPath.endsWith('/') ? currentPath + fileName : currentPath + '/' + fileName;
    
    const link = document.createElement('a');
    link.href = `/download?path=${encodeURIComponent(fullPath)}`;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

async function renameFile() {
    if (!contextMenuState.item) return;
    const oldName = contextMenuState.name;
    const newName = document.getElementById('rename-new-name').value.trim();
    const currentPath = contextMenuState.path;
    
    if (!newName || newName === oldName) {
        hideModal('rename-modal');
        return;
    }
    
    try {
        const formData = new URLSearchParams();
        formData.append('old_path', currentPath + (currentPath.endsWith('/') ? '' : '/') + oldName);
        formData.append('new_path', currentPath + (currentPath.endsWith('/') ? '' : '/') + newName);
        
        const response = await fetch('/rename', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        if (response.ok) window.location.reload();
        else alert((await response.text()));
    } catch (e) {
        alert('Error: ' + e);
    }
    hideModal('rename-modal');
}

async function deleteFile() {
    if (!contextMenuState.item) return;
    const fileName = contextMenuState.name;
    const fileType = contextMenuState.type;
    const currentPath = contextMenuState.path;
    
    try {
        const formData = new URLSearchParams();
        formData.append('path', currentPath + (currentPath.endsWith('/') ? '' : '/') + fileName);
        formData.append('type', fileType);
        
        const response = await fetch('/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        if (response.ok) window.location.reload();
        else alert((await response.text()));
    } catch (e) {
        alert('Error: ' + e);
    } finally {
        hideModal('delete-modal');
        clearContextMenuState();
    }
}
</script>
